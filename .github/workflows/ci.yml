name: CI/CD

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  fe-lint:
    name: frontend lint
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
      
      - name: node setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      
      - name: install dependencies
        working-directory: frontend
        run: npm ci
      
      - name: run lint
        working-directory: frontend
        run: npm run lint:check
      
  be-lint:
    name: backend lint
    runs-on: ubuntu-latest

    steps:
      - name: checkout
        uses: actions/checkout@v4
    
      - name: java setup
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven
    
      - name: chmod mvnw
        working-directory: backend
        run: chmod +x mvnw
    
      - name: run lint
        working-directory: backend
        run: ./mvnw checkstyle:check
  
  fe-format:
    name: frontend format
    runs-on: ubuntu-latest
    needs: [fe-lint, be-lint]

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: node setup
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: npm
          cache-dependency-path: frontend/package-lock.json
      
      - name: install dependencies
        working-directory: frontend
        run: npm ci

      - name: run format
        working-directory: frontend
        run: npm run format:check

  be-format:
    name: backend format
    runs-on: ubuntu-latest
    needs: [fe-lint, be-lint]

    steps:
      - name: checkout
        uses: actions/checkout@v4

      - name: java setup
        uses: actions/setup-java@v5
        with:
          distribution: temurin
          java-version: 25
          cache: maven
      
      - name: chmod mvnw
        working-directory: backend
        run: chmod +x mvnw
      
      - name: run format
        working-directory: backend
        run: ./mvnw spotless:check